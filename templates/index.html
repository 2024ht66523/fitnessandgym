<!DOCTYPE html>
<html>
<body style="background:#1a1a1a;color:white">

<h1>ACEest Dashboard</h1>

<form method="POST">

<input name="new_name" placeholder="New client">

<select name="selected_client">
<option value="">Select Client</option>
{% for c in clients %}
<option>{{c}}</option>
{% endfor %}
</select>

<br><br>

<button name="action" value="save_client">Save</button>
<button name="action" value="load_client">Load</button>
<button name="action" value="generate_program">Generate Program</button>
<button name="action" value="export_pdf">PDF</button>

<br><br>

<h3>Add Workout</h3>
<input name="date" placeholder="YYYY-MM-DD">
<input name="type" placeholder="Type">
<input name="duration" placeholder="Duration">
<input name="notes" placeholder="Notes">

<button name="action" value="add_workout">Add Workout</button>

</form>

<p>{{message}}</p>

<h3>Program: {{program}}</h3>

<h3>Workouts</h3>
<ul>
{% for w in workouts %}
<li>{{w[0]}} - {{w[1]}} ({{w[2]}} min)</li>
{% endfor %}
</ul>

</body>
</html>
